services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: test_db
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo

  odoo:
    build: .
    depends_on:
      postgres:
        condition: service_healthy

    command: >
      odoo
      --db_host=postgres
      --db_port=5432
      --db_user=odoo
      --db_password=odoo
      --database=test_db
      -i base
      --test-enable
      --stop-after-init
