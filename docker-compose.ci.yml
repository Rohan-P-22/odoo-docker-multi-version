services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: odoo
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 5s
      timeout: 5s
      retries: 5

  odoo:
    build: .
    depends_on:
      postgres:
        condition: service_healthy

    command: >
      odoo
      --db_host=postgres
      --db_port=5432
      --db_user=odoo
      --db_password=odoo
      -d odoo
      -i base
      --stop-after-init
