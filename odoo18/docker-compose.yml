services:
  odoo18:
    image: rohanp1722/odoo-multi-version:latest
    container_name: odoo18
    restart: always
    env_file: .env
    environment:
      HOST: ${DB_HOST}
      USER: ${DB_USER}
      PASSWORD: ${DB_PASSWORD}
    volumes:
      - odoo18-data:/var/lib/odoo
      - ./odoo.conf:/etc/odoo/odoo.conf
      - ./addons:/mnt/extra-addons
    networks:
      - odoo18-network
      - shared-db-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  nginx18:
    image: nginx:latest
    container_name: nginx18
    restart: always
    ports:
      - "8069:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - odoo18
    networks:
      - odoo18-network

volumes:
  odoo18-data:

networks:
  odoo18-network:
  shared-db-network:
    external: true
