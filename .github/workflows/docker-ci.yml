name: Odoo CI (Production Ready)

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pre-commit pylint pylint-odoo flake8 black isort

      - name: Run pre-commit
        run: pre-commit run --all-files

  test:
    name: Run Odoo CI Tests (v18 + v19)
    runs-on: ubuntu-22.04
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Odoo18 image locally    # ✅ build first
        run: docker build -f Dockerfile.18 -t rohanp1722/odoo-multi-version:18-latest .

      - name: Build Odoo19 image locally    # ✅ build first
        run: docker build -f Dockerfile.19 -t rohanp1722/odoo-multi-version:19-latest .

      - name: Run Docker Compose (CI)
        run: |
          docker compose -f docker-compose.ci.yml up --abort-on-container-exit

  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-22.04
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push Odoo18 Image
        run: |
          docker build -f Dockerfile.18 \
            -t ${{ secrets.DOCKER_USERNAME }}/odoo-multi-version:18-latest \
            -t ${{ secrets.DOCKER_USERNAME }}/odoo-multi-version:18-1.0.${{ github.run_number }} \
            .
          docker push ${{ secrets.DOCKER_USERNAME }}/odoo-multi-version:18-latest
          docker push ${{ secrets.DOCKER_USERNAME }}/odoo-multi-version:18-1.0.${{ github.run_number }}

      - name: Build & Push Odoo19 Image
        run: |
          docker build -f Dockerfile.19 \
            -t ${{ secrets.DOCKER_USERNAME }}/odoo-multi-version:19-latest \
            -t ${{ secrets.DOCKER_USERNAME }}/odoo-multi-version:19-1.0.${{ github.run_number }} \
            .
          docker push ${{ secrets.DOCKER_USERNAME }}/odoo-multi-version:19-latest
          docker push ${{ secrets.DOCKER_USERNAME }}/odoo-multi-version:19-1.0.${{ github.run_number }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/odoo-docker
            git stash
            git pull origin main

            # Restore odoo.conf if git pull deleted it
            if [ ! -f odoo18/odoo.conf ] || [ -d odoo18/odoo.conf ]; then
              echo "Restoring odoo18/odoo.conf from backup..."
              rm -rf odoo18/odoo.conf
              cp /opt/odoo-configs/odoo18.conf odoo18/odoo.conf
            fi

            if [ ! -f odoo19/odoo.conf ] || [ -d odoo19/odoo.conf ]; then
              echo "Restoring odoo19/odoo.conf from backup..."
              rm -rf odoo19/odoo.conf
              cp /opt/odoo-configs/odoo19.conf odoo19/odoo.conf
            fi

            ./deploy.sh
