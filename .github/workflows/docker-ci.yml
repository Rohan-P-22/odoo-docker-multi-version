name: Odoo CI (Basic)

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pre-commit pylint pylint-odoo flake8 black isort

      - name: Run pre-commit
        run: pre-commit run --all-files
