name: Odoo CI (Basic)

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pre-commit pylint pylint-odoo flake8 black isort

      - name: Run pre-commit
        run: pre-commit run --all-files

  test:
    name: Odoo Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
        options: >-
          --health-cmd="pg_isready -U odoo"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Odoo Docker image
      run: |
        docker build -t odoo-test -f Dockerfile .

    - name: Run Odoo tests
      run: |
        docker run --rm \
          --network host \
          -e DB_HOST=localhost \
          -e DB_PORT=5432 \
          -e DB_USER=odoo \
          -e DB_PASSWORD=odoo \
          odoo-test \
          odoo \
          --db_host=postgres \
          --db_port=5432 \
          --db_user=odoo \
          --db_password=odoo \
          -d test_db -i base \
          --test-enable \
          --stop-after-init

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Docker Image
      run: |
       docker build -t ${{ secrets.DOCKER_USERNAME }}/odoo-multi-version:latest .

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/odoo-multi-version:latest
